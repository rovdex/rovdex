name: Desktop Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux Dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Frontend Dependencies
        working-directory: crates/desktop
        run: npm install

      - name: Build Tauri App
        working-directory: crates/desktop
        run: npx tauri build --target ${{ matrix.target }}

      - name: Collect Artifacts
        shell: bash
        run: |
          mkdir -p dist/release-assets
          find crates/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/dmg -name "*.dmg" -exec cp {} dist/release-assets/ \; || true
          find crates/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/nsis -name "*.exe" -exec cp {} dist/release-assets/ \; || true
          find crates/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/deb -name "*.deb" -exec cp {} dist/release-assets/ \; || true
          find crates/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/rpm -name "*.rpm" -exec cp {} dist/release-assets/ \; || true
          find crates/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/appimage -name "*.AppImage" -exec cp {} dist/release-assets/ \; || true

      - name: Release Artifacts
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: dist/release-assets/*
